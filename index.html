<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Realidad Aumentada Educcartito STEAMLab</title>

  <!-- Librerías principales: A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      --azul: #06142e;
      --azul2: #0d47a1;
      --amarillo: #ffeb3b;
      --blanco: #ffffff;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    #panelInicio {
      position: fixed;
      z-index: 9999;
      inset: 0;
      background: radial-gradient(circle at top, #1e88e5, var(--azul2) 35%, var(--azul) 78%);
      color: var(--blanco);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    #cajaInicio {
      max-width: 460px;
      background: rgba(0, 0, 0, 0.38);
      padding: 26px;
      border-radius: 24px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.38);
      border: 1px solid rgba(255,255,255,0.22);
    }

    #cajaInicio h1 {
      font-size: 30px;
      margin: 0 0 12px 0;
      line-height: 1.15;
    }

    #cajaInicio p {
      font-size: 17px;
      line-height: 1.5;
      margin: 10px 0;
    }

    #btnIniciar {
      margin-top: 18px;
      padding: 15px 24px;
      font-size: 18px;
      border: none;
      border-radius: 16px;
      background: var(--amarillo);
      color: #111;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.28);
    }

    #mensaje {
      position: fixed;
      z-index: 9998;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.68);
      color: white;
      padding: 11px 16px;
      border-radius: 16px;
      font-size: 15px;
      text-align: center;
      max-width: 92%;
      box-sizing: border-box;
    }

    #botonSonido {
      position: fixed;
      z-index: 9997;
      top: 14px;
      right: 14px;
      display: none;
      padding: 10px 14px;
      border: none;
      border-radius: 14px;
      background: rgba(255, 235, 59, 0.92);
      color: #111;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 5px 16px rgba(0,0,0,0.3);
    }
  </style>

  <script>
    AFRAME.registerComponent("control-video-ra", {
      init: function () {
        const video = document.querySelector("#videoEduccartito");
        const mensaje = document.querySelector("#mensaje");
        const botonSonido = document.querySelector("#botonSonido");

        const reproducirVideo = async () => {
          try {
            video.currentTime = 0;
            await video.play();
            mensaje.innerHTML = "¡Educcartito apareció! Baila, aprende y descubre patrones.";
            botonSonido.style.display = "inline-block";
          } catch (error) {
            mensaje.innerHTML = "Toca la pantalla o el botón de sonido para activar el video.";
            botonSonido.style.display = "inline-block";
          }
        };

        this.el.addEventListener("targetFound", () => {
          reproducirVideo();
        });

        this.el.addEventListener("targetLost", () => {
          video.pause();
          mensaje.innerHTML = "Busca nuevamente la tarjeta de Educcartito.";
        });
      }
    });

    window.addEventListener("load", () => {
      const btn = document.querySelector("#btnIniciar");
      const panel = document.querySelector("#panelInicio");
      const video = document.querySelector("#videoEduccartito");
      const mensaje = document.querySelector("#mensaje");
      const botonSonido = document.querySelector("#botonSonido");

      btn.addEventListener("click", async () => {
        panel.style.display = "none";
        mensaje.innerHTML = "Permite la cámara y apunta hacia la tarjeta de Educcartito.";

        // Primer toque del usuario para preparar la reproducción en celulares.
        try {
          video.muted = false;
          await video.play();
          video.pause();
          video.currentTime = 0;
        } catch (error) {
          console.log("El video se reproducirá cuando se detecte la imagen marcador.");
        }
      });

      botonSonido.addEventListener("click", async () => {
        try {
          video.muted = false;
          await video.play();
          mensaje.innerHTML = "Sonido activado. ¡Educcartito está bailando!";
        } catch (error) {
          mensaje.innerHTML = "El navegador no permitió activar el sonido todavía. Toca nuevamente.";
        }
      });

      document.body.addEventListener("click", async () => {
        if (panel.style.display === "none" && video.paused === false) {
          try {
            video.muted = false;
            await video.play();
          } catch (error) {}
        }
      });
    });
  </script>
</head>

<body>

  <div id="panelInicio">
    <div id="cajaInicio">
      <h1>STEAMLab RA</h1>
      <p>
        Presiona el botón, permite el uso de la cámara y apunta hacia la tarjeta de Educcartito.
      </p>
      <p>
        Cuando la imagen sea reconocida, aparecerá el video de Educcartito bailando en realidad aumentada.
      </p>
      <button id="btnIniciar">Iniciar experiencia AR</button>
    </div>
  </div>

  <button id="botonSonido">Activar sonido</button>
  <div id="mensaje">Preparando la experiencia...</div>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <!-- Debes subir tu video con este nombre exacto en la misma carpeta del index.html. -->
      <video
        id="videoEduccartito"
        src="educcartito-bailando.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false">
    </a-camera>

    <a-entity
      mindar-image-target="targetIndex: 0"
      control-video-ra>

      <!-- Ajusta width y height si deseas que el video aparezca más grande o más pequeño. -->
      <a-video
        src="#videoEduccartito"
        position="0 0 0.05"
        rotation="0 0 0"
        width="1.28"
        height="0.72">
      </a-video>

    </a-entity>
  </a-scene>

</body>
</html>
