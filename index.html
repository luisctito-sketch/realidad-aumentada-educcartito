<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <title>Realidad Aumentada Educcartito STEAMLab</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    .a-enter-vr,
    .a-enter-ar,
    .a-enter-vr-button,
    .a-enter-ar-button,
    .a-orientation-modal {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #pantallaInicio {
      position: fixed;
      z-index: 9999;
      inset: 0;
      background: radial-gradient(circle at top, #173b9f 0%, #07122d 45%, #000000 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    #tarjetaInicio {
      width: min(92vw, 460px);
      padding: 26px 22px;
      border-radius: 26px;
      background: rgba(0, 0, 0, 0.45);
      box-shadow: 0 12px 30px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
    }

    #tarjetaInicio h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
      line-height: 1.15;
    }

    #tarjetaInicio p {
      margin: 10px 0;
      font-size: 17px;
      line-height: 1.45;
    }

    .botonPrincipal {
      margin-top: 20px;
      padding: 15px 22px;
      border: none;
      border-radius: 999px;
      background: #ffeb3b;
      color: #111;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    }

    #botonSonido {
      position: fixed;
      z-index: 9998;
      top: 18px;
      right: 18px;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: #ffeb3b;
      color: #111;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
      display: none;
    }

    #mensaje {
      position: fixed;
      z-index: 9997;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: min(90vw, 560px);
      padding: 12px 16px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.68);
      color: #fff;
      font-size: 17px;
      line-height: 1.35;
      text-align: center;
      box-sizing: border-box;
    }
  </style>

  <script>
    /*
      VERSIÓN CORREGIDA:
      - Reemplaza <a-video> por <a-plane> con material de video.
      - Esto soluciona casos donde se oye el audio, pero no se ve la imagen del video.
      - El video está en formato horizontal 16:9 y aumentado de tamaño.
    */

    AFRAME.registerComponent("control-video-educcartito", {
      init: function () {
        const video = document.querySelector("#videoEduccartito");
        const plano = document.querySelector("#planoVideoEduccartito");
        const mensaje = document.querySelector("#mensaje");

        const prepararTextura = () => {
          if (plano) {
            plano.setAttribute("visible", "true");
            plano.setAttribute("material", "shader: flat; src: #videoEduccartito; side: double; transparent: false; opacity: 1;");
          }
        };

        this.el.addEventListener("targetFound", async () => {
          prepararTextura();
          mensaje.innerHTML = "¡Educcartito apareció!<br>Baila, aprende y descubre patrones.";
          video.currentTime = 0;

          try {
            await video.play();
            prepararTextura();
          } catch (error) {
            mensaje.innerHTML = "Educcartito apareció.<br>Toca “Activar sonido” para iniciar el video.";
          }
        });

        this.el.addEventListener("targetLost", () => {
          mensaje.innerHTML = "Busca nuevamente la tarjeta de Educcartito.";
          video.pause();
        });
      }
    });

    window.addEventListener("load", () => {
      const pantallaInicio = document.querySelector("#pantallaInicio");
      const botonIniciar = document.querySelector("#botonIniciar");
      const botonSonido = document.querySelector("#botonSonido");
      const video = document.querySelector("#videoEduccartito");
      const plano = document.querySelector("#planoVideoEduccartito");
      const mensaje = document.querySelector("#mensaje");

      const refrescarPlano = () => {
        if (plano) {
          plano.setAttribute("visible", "true");
          plano.setAttribute("material", "shader: flat; src: #videoEduccartito; side: double; transparent: false; opacity: 1;");
        }
      };

      video.addEventListener("loadeddata", refrescarPlano);
      video.addEventListener("canplay", refrescarPlano);
      video.addEventListener("playing", refrescarPlano);

      botonIniciar.addEventListener("click", async () => {
        pantallaInicio.style.display = "none";
        botonSonido.style.display = "block";
        mensaje.innerHTML = "Acepta el permiso de cámara y apunta hacia la tarjeta de Educcartito.";

        try {
          /*
            Primero lo iniciamos en silencio para que el navegador desbloquee
            la textura del video. Luego el botón Activar sonido lo deja con audio.
          */
          video.muted = true;
          video.load();
          await video.play();
          refrescarPlano();
          video.pause();
          video.currentTime = 0;
        } catch (error) {
          console.log("El video se activará cuando se detecte la imagen.");
        }
      });

      botonSonido.addEventListener("click", async () => {
        try {
          video.muted = false;
          refrescarPlano();
          await video.play();
          mensaje.innerHTML = "Sonido activado.<br>Apunta hacia la tarjeta de Educcartito.";
        } catch (error) {
          mensaje.innerHTML = "Toca nuevamente la pantalla o revisa el permiso de sonido del navegador.";
        }
      });

      setTimeout(() => {
        document.querySelectorAll(".a-enter-vr, .a-enter-ar, .a-enter-vr-button, .a-enter-ar-button").forEach(el => {
          el.style.display = "none";
          el.style.visibility = "hidden";
          el.style.opacity = "0";
          el.style.pointerEvents = "none";
        });
      }, 1500);
    });
  </script>
</head>

<body>

  <div id="pantallaInicio">
    <div id="tarjetaInicio">
      <h1>Educcartito cobra vida</h1>
      <p>Experiencia de Realidad Aumentada STEAMLab.</p>
      <p>Presiona el botón, acepta el permiso de cámara y apunta hacia la tarjeta de Educcartito.</p>
      <button id="botonIniciar" class="botonPrincipal">Iniciar experiencia AR</button>
    </div>
  </div>

  <button id="botonSonido">Activar sonido</button>

  <div id="mensaje">
    Preparando la experiencia de realidad aumentada...
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes; uiLoading: yes; uiError: yes;"
    embedded
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: false; alpha: true; antialias: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="20000">
      <video
        id="videoEduccartito"
        src="./educcartito-bailando.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false">
    </a-camera>

    <a-entity
      mindar-image-target="targetIndex: 0"
      control-video-educcartito>

      <!--
        PLANO DE VIDEO MÁS GRANDE, HORIZONTAL 16:9.
        Esta versión usa a-plane, más estable en celulares cuando el audio se oye pero la imagen no aparece.

        Tamaño actual:
        width="2.20"
        height="1.24"

        Si se ve muy grande:
        width="1.90"
        height="1.07"

        Si se ve pequeño:
        width="2.45"
        height="1.38"
      -->
      <a-plane
        id="planoVideoEduccartito"
        position="0 0 0.12"
        rotation="0 0 0"
        width="2.20"
        height="1.24"
        visible="false"
        material="shader: flat; src: #videoEduccartito; side: double; transparent: false; opacity: 1;">
      </a-plane>

    </a-entity>
  </a-scene>

</body>
</html>
